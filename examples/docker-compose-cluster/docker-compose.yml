services:
  node-a:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.server
    command: ["serve", "--config", "/etc/lsm/server.yaml"]
    ports:
      - "8080:8080"
    volumes:
      - ./node-a.yaml:/etc/lsm/server.yaml:ro
      - ./peer-urls.yaml:/etc/lsm/peer-urls.yaml:ro
      - node-a-data:/data

  node-b:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.server
    command: ["serve", "--config", "/etc/lsm/server.yaml"]
    ports:
      - "8081:8080"
    volumes:
      - ./node-b.yaml:/etc/lsm/server.yaml:ro
      - ./peer-urls.yaml:/etc/lsm/peer-urls.yaml:ro
      - node-b-data:/data

  node-c:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.server
    command: ["serve", "--config", "/etc/lsm/server.yaml"]
    ports:
      - "8082:8080"
    volumes:
      - ./node-c.yaml:/etc/lsm/server.yaml:ro
      - ./peer-urls.yaml:/etc/lsm/peer-urls.yaml:ro
      - node-c-data:/data

  node-d:
    profiles: ["replacement"]
    build:
      context: ../..
      dockerfile: docker/Dockerfile.server
    command: ["serve", "--config", "/etc/lsm/server.yaml"]
    ports:
      - "8083:8080"
    volumes:
      - ./node-d.yaml:/etc/lsm/server.yaml:ro
      - ./peer-urls.yaml:/etc/lsm/peer-urls.yaml:ro
      - node-d-data:/data

  gateway:
    profiles: ["gateway"]
    build:
      context: ../..
      dockerfile: docker/Dockerfile.server
    command:
      - gateway
      - --listen
      - 0.0.0.0:8090
      - --bootstrap-url
      - http://node-a:8080
      - --write-consistency-default
      - local_committed
      - --endpoint-file
      - /etc/lsm/peer-urls.yaml
    ports:
      - "8090:8090"
    volumes:
      - ./peer-urls.yaml:/etc/lsm/peer-urls.yaml:ro
    depends_on:
      - node-a
      - node-b
      - node-c

volumes:
  node-a-data:
  node-b-data:
  node-c-data:
  node-d-data:
