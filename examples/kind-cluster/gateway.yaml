apiVersion: v1
kind: ConfigMap
metadata:
  name: lsm-gateway-endpoints
  namespace: lsm-cluster
data:
  peer-urls.yaml: |
    lsm-cluster-0: "http://lsm-cluster-0.lsm-cluster.lsm-cluster.svc.cluster.local:8080"
    lsm-cluster-1: "http://lsm-cluster-1.lsm-cluster.lsm-cluster.svc.cluster.local:8080"
    lsm-cluster-2: "http://lsm-cluster-2.lsm-cluster.lsm-cluster.svc.cluster.local:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: lsm-gateway
  namespace: lsm-cluster
spec:
  selector:
    app: lsm-gateway
  ports:
    - name: http
      port: 8090
      targetPort: 8090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lsm-gateway
  namespace: lsm-cluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lsm-gateway
  template:
    metadata:
      labels:
        app: lsm-gateway
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: gateway
          image: lsmengine-server:kind
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          command:
            - /usr/local/bin/lsmctl
          args:
            - gateway
            - --listen
            - 0.0.0.0:8090
            - --bootstrap-url
            - http://lsm-cluster-0.lsm-cluster.lsm-cluster.svc.cluster.local:8080
            - --write-consistency-default
            - local_committed
            - --endpoint-file
            - /etc/lsm/peer-urls.yaml
          ports:
            - containerPort: 8090
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8090
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 30
          volumeMounts:
            - name: endpoints
              mountPath: /etc/lsm
              readOnly: true
      volumes:
        - name: endpoints
          configMap:
            name: lsm-gateway-endpoints
