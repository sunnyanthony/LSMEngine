apiVersion: v1
kind: ConfigMap
metadata:
  name: lsm-server-config
  namespace: lsm-example
data:
  server.yaml: |
    data_dir: "/var/lib/lsm"
    addr: "127.0.0.1:8080"
    read_timeout: "5s"
    write_timeout: "5s"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: lsm-example
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - name: listener_https
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8443
        filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                - certificate_chain:
                    filename: /etc/envoy/tls/tls.crt
                  private_key:
                    filename: /etc/envoy/tls/tls.key
          filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              route_config:
                name: local_route
                virtual_hosts:
                - name: lsm
                  domains: ["*"]
                  routes:
                  - match: { prefix: "/" }
                    route: { cluster: lsm_backend }
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
      - name: lsm_backend
        connect_timeout: 1s
        type: strict_dns
        load_assignment:
          cluster_name: lsm_backend
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 8080
