data_dir: "./data"
node_id: "node-a"
cluster_id: "cluster-dev"
storage_mode: "local"
control_state_path: "./data/control_state.json"
commitlog:
  provider: "local"
  # snapshot_policy is only used by the builtin etcd-raft provider.
  # It controls raft log snapshot/compaction, not full LSM state transfer.
  # snapshot_policy:
  #   applied_entries: 1024
  #   retain_entries: 128
raft:
  replicas: 3
  election_timeout: "2s"
  heartbeat_interval: "500ms"
  peers: ["node-a", "node-b", "node-c"]
  # Set join: true only for a fresh node being added to an existing raft
  # cluster; it skips local bootstrap and waits for raft-add/ConfChange.
  # join: true
  # peer_urls is only required when commitlog.provider is "etcd-raft"
  # and raft.peers contains more than one node.
  # peer_urls:
  #   node-b: "http://127.0.0.1:8081"
  #   node-c: "http://127.0.0.1:8082"
shards:
  # shards are ordered by key-range routing; keep non-overlapping ranges.
  - id: "users-a-m"
    start_key: "a"
    end_key: "m"
    replicas: ["node-a", "node-b", "node-c"]
    leader: "node-a"
  - id: "users-m-z"
    start_key: "m"
    end_key: ""
    replicas: ["node-a", "node-b", "node-c"]
    leader: "node-b"
addr: "127.0.0.1:8080"
read_timeout: "5s"
write_timeout: "5s"
write_consistency_default: "accepted"
# io_backend: "async"
# io_backend_strict: false
# io_async_max_in_flight: 64
