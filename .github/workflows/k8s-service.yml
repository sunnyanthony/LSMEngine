name: k8s-service

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  k8s-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kind
        uses: helm/kind-action@v1.8.0

      - name: Build and run Envoy example
        run: SKIP_PORT_FORWARD=1 scripts/kind-envoy-example.sh

      - name: Probe health
        run: |
          kubectl -n lsm-example port-forward service/lsm-server 8443:8443 >/tmp/port-forward.log 2>&1 &
          pf_pid=$!
          trap 'kill ${pf_pid}' EXIT
          for i in {1..30}; do
            if curl -k https://127.0.0.1:8443/healthz; then
              exit 0
            fi
            sleep 2
          done
          exit 1
